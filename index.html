<script>
  var TRIPS = [{"slug":"italy","title":"ITALY — TWO WEEKS: TUSCANY, DEEP","page":"italy.html","start":"2026-10-03"},{"slug":"westfjords","title":"WESTFJORDS — HOT POOLS & FJORDS","page":"westfjords.html","start":"2026-07-15"}];
  (function () {
    var now = Date.now(), best = null, bestScore = Infinity;
    TRIPS.forEach(function (t) {
      if (!t.start) return;
      var d = new Date(t.start + "T00:00:00").getTime();
      var diff = d - now;
      var score = diff >= 0 ? diff : (-diff + 1e13); // prefer soonest upcoming, else most recent past
      if (score < bestScore) { bestScore = score; best = t; }
    });
    if (!best && TRIPS.length) best = TRIPS[0];
    if (best) location.replace(best.page);
  })();
</script>
</body>
